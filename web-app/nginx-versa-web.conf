server {
    listen 80;
    server_name api.kimbu.cslade.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.kimbu.cslade.space;

    ssl_certificate     /etc/letsencrypt/live/api.kimbu.cslade.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kimbu.cslade.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name versa.cslade.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name versa.cslade.space;

    ssl_certificate     /etc/letsencrypt/live/api.kimbu.cslade.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kimbu.cslade.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /sync {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    root /var/www/versa;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
