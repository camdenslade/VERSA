name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build relay binary
        working-directory: backend
        run: GOARCH=amd64 GOOS=linux CGO_ENABLED=0 go build -ldflags="-s -w" -o relay ./cmd/server

      - name: Cache wasm-bindgen-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-bindgen
          key: wasm-bindgen-0.2.118

      - name: Install wasm-bindgen-cli
        run: |
          if ! command -v wasm-bindgen &>/dev/null; then
            cargo install wasm-bindgen-cli --version 0.2.118 --locked
          fi

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: shared-core/target
          key: rust-wasm-${{ hashFiles('shared-core/Cargo.lock') }}
          restore-keys: rust-wasm-

      - name: Build WASM
        working-directory: shared-core
        run: |
          rustup target add wasm32-unknown-unknown
          cargo build --lib --release --target wasm32-unknown-unknown --features wasm
          mkdir -p ../web-app/src/wasm/pkg
          wasm-bindgen \
            --target web \
            --out-dir ../web-app/src/wasm/pkg \
            target/wasm32-unknown-unknown/release/versa_core.wasm
          echo '{"type":"module","name":"versa-core","version":"0.1.0"}' \
            > ../web-app/src/wasm/pkg/package.json

      - name: Build web app
        working-directory: web-app
        env:
          VITE_RELAY_URL: wss://versa.cslade.space:443/sync
          VITE_KIMBU_URL: https://api.kimbu.cslade.space/v1/auth
          VITE_KIMBU_APP_ID: versa
        run: npm ci && npm run build

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.VERSA_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem

          # Deploy relay binary
          scp -i key.pem -o StrictHostKeyChecking=no backend/relay ec2-user@3.215.112.0:/opt/versa/versa-relay-new
          ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@3.215.112.0 "
            mv /opt/versa/versa-relay-new /opt/versa/versa-relay &&
            chmod +x /opt/versa/versa-relay &&
            pm2 restart versa-relay &&
            sleep 3 &&
            pm2 logs versa-relay --lines 20 --nostream &&
            curl -sf http://localhost:8080/healthz || exit 1
          "

          # Deploy web app static files
          ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@3.215.112.0 "sudo mkdir -p /var/www/versa && sudo chown ec2-user:ec2-user /var/www/versa"
          scp -i key.pem -o StrictHostKeyChecking=no -r web-app/dist/* ec2-user@3.215.112.0:/var/www/versa/

          # Update nginx config (replaces versa-kimbu.conf to add static file serving at /)
          scp -i key.pem -o StrictHostKeyChecking=no web-app/nginx-versa-web.conf ec2-user@3.215.112.0:/tmp/versa-kimbu.conf
          ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@3.215.112.0 "
            sudo mv /tmp/versa-kimbu.conf /etc/nginx/conf.d/versa-kimbu.conf &&
            sudo nginx -t && sudo systemctl reload nginx
          "

          rm key.pem
